<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rima Berg — Clasificación visual (Claude)</title>
<style>
  :root { --bg:#0e0e10; --panel:#17171b; --line:#2a2a31; --ink:#eee; --mut:#9a9aa5;
          --hi:#3ddc97; --md:#f5c451; --lo:#e8825a; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif; }
  header { padding:20px 24px; border-bottom:1px solid var(--line); position:sticky; top:0;
           background:var(--bg); z-index:5; }
  h1 { margin:0 0 4px; font-size:18px; }
  .sub { color:var(--mut); font-size:13px; }
  .tabs { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
  .tab { padding:6px 12px; border:1px solid var(--line); border-radius:20px; cursor:pointer;
         color:var(--mut); background:var(--panel); }
  .tab.on { color:var(--ink); border-color:var(--hi); }
  main { padding:20px 24px; max-width:1200px; }
  .cluster { background:var(--panel); border:1px solid var(--line); border-radius:12px;
             padding:14px 16px; margin-bottom:16px; }
  .chead { display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; margin-bottom:10px; }
  .cid { font-weight:700; font-size:13px; color:var(--mut); }
  .ctitle { font-weight:600; }
  .badge { font-size:11px; padding:2px 8px; border-radius:10px; font-weight:600; }
  .hi { background:rgba(61,220,151,.15); color:var(--hi); }
  .md { background:rgba(245,196,81,.15); color:var(--md); }
  .lo { background:rgba(232,130,90,.15); color:var(--lo); }
  .hyp { color:var(--mut); font-size:12px; }
  .hyp b { color:var(--ink); }
  .pgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:8px; }
  figure { margin:0; }
  figure img { width:100%; aspect-ratio:1; object-fit:cover; border-radius:8px; background:#000;
               border:1px solid var(--line); }
  figcaption { font-size:10px; color:var(--mut); text-align:center; margin-top:2px;
               overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .note { background:rgba(232,130,90,.08); border:1px solid var(--lo); color:#f0c4b2;
          padding:12px 14px; border-radius:10px; margin-bottom:16px; font-size:13px; }
  .hidden { display:none; }
</style>
</head>
<body>

  <div class="tabs">
    <div class="tab on" data-cat="rings">Anillos (33 clusters)</div>
    <div class="tab" data-cat="earrings">Aros</div>
    <div class="tab" data-cat="pendants">Colgantes</div>
    <div class="tab" data-cat="groups">Fotos grupales</div>
  </div>
</header>

const BADGE = {hi:"alta",md:"media",lo:"baja"};

function render(cat){
  const app = document.getElementById("app");
  let html = NOTES[cat] ? '<div class="note">'+NOTES[cat]+'</div>' : '';
  for(const [id,title,conf,hyp,photos] of DATA[cat]){
    html += '<div class="cluster"><div class="chead">'+
      '<span class="cid">'+id+'</span>'+
      '<span class="ctitle">'+title+'</span>'+
      '<span class="badge '+conf+'">'+BADGE[conf]+'</span>'+
      '<span class="hyp">→ hipótesis: <b>'+hyp+'</b> · '+photos.length+' fotos</span>'+
      '</div><div class="pgrid">';
    for(const f of photos){
      html += '<figure><img loading="lazy" src="'+IMG+f+resolveExt(f)+'"><figcaption>'+f+'</figcaption></figure>';
    }
    html += '</div></div>';
  }
  app.innerHTML = html;
}
